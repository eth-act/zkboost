services:
  zkboost-server:
    image: zkboost-server:local
    build:
      context: ../../..
      dockerfile: ./docker/Dockerfile
    command: ["--config", "/app/config.toml"]
    volumes:
      - ./config/zkboost-server.toml:/app/config.toml:ro
    networks:
      - mock-zkattestor
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - RUST_LOG=info,zkboost=debug
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      start_period: 1s
      start_interval: 1s

  mock-zkattestor:
    image: zkboost-server:local
    entrypoint: ["/usr/local/bin/mock-zkattestor"]
    command:
      - "--cl-endpoint"
      - "http://host.docker.internal:33001"
      - "--zkboost-endpoint"
      - "http://zkboost-server:3000"
      - "--proof-types"
      - "ethrex-zisk,reth-zisk"
    networks:
      - mock-zkattestor
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - RUST_LOG=info,zkboost=debug
    restart: unless-stopped
    depends_on:
      zkboost-server:
        condition: service_healthy

networks:
  mock-zkattestor:
    name: mock-zkattestor
