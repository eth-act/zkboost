services:
  zkboost:
    image: zkboost:local
    build:
      context: ../../..
      dockerfile: ./docker/Dockerfile
    command: ["--config", "/app/config.toml"]
    ports:
      - "3000:3000"
    volumes:
      - ./zkboost/config.toml:/app/config.toml:ro
    networks:
      - zkboost
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - RUST_LOG=info,zkboost=debug
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      start_period: 1s
      start_interval: 1s

  mock-zkattestor:
    image: zkboost:local
    entrypoint: ["/usr/local/bin/mock-zkattestor"]
    command:
      - "--cl-endpoint"
      - "http://host.docker.internal:33001"
      - "--zkboost-endpoint"
      - "http://zkboost:3000"
      - "--proof-types"
      - "ethrex-zisk,reth-zisk"
    networks:
      - zkboost
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - RUST_LOG=info,zkboost=debug
    restart: unless-stopped
    depends_on:
      zkboost:
        condition: service_healthy

networks:
  zkboost:
    name: zkboost-mock-zkattestor
