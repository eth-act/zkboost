services:
  zkboost:
    image: zkboost:local
    build:
      context: ../../..
      dockerfile: ./docker/Dockerfile
    command: ["--config", "/app/config.toml"]
    ports:
      - "3000:3000"
    volumes:
      - ./zkboost/config.toml:/app/config.toml:ro
    networks:
      - zkboost
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - RUST_LOG=info,zkboost=debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      start_period: 1s
      start_interval: 1s
    restart: unless-stopped

  mock-zkattestor:
    image: zkboost:local
    entrypoint: ["/usr/local/bin/mock-zkattestor"]
    command:
      - "--cl-endpoint"
      - "http://host.docker.internal:33001"
      - "--zkboost-endpoint"
      - "http://zkboost:3000"
      - "--proof-types"
      - "ethrex-zisk,reth-zisk,reth-sp1,reth-risc0"
    networks:
      - zkboost
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - RUST_LOG=info,zkboost=debug
    depends_on:
      zkboost:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.10.0
    ports:
      - "9090:9090"
    networks:
      - zkboost
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      zkboost:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    networks:
      - zkboost
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:

networks:
  zkboost:
    name: zkboost-observability
