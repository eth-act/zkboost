services:
  download-programs:
    image: alpine:latest
    command:
      - /bin/sh
      - -c
      - |
        if [ -f /programs/stateless-validator-ethrex-zisk ] && [ -f /programs/stateless-validator-reth-zisk ]; then
          echo "Binaries already exist, skipping download."
          exit 0
        fi
        apk add --no-cache curl minisign bash
        bash /scripts/download-ere-guest.sh --tag v0.7.0 --guest stateless-validator-ethrex-zisk --output-dir /programs
        bash /scripts/download-ere-guest.sh --tag v0.7.0 --guest stateless-validator-reth-zisk --output-dir /programs
    volumes:
      - programs:/programs
      - ../../../scripts/download-ere-guest.sh:/scripts/download-ere-guest.sh:ro

  ethrex-zisk:
    image: ghcr.io/eth-act/ere/ere-server-zisk:0.6.0-cuda
    command: ["--port", "3000", "--program-path", "/programs/stateless-validator-ethrex-zisk", "gpu"]
    depends_on:
      download-programs:
        condition: service_completed_successfully
    volumes:
      - programs:/programs:ro
    shm_size: 32G
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - zkboost
    environment:
      - RUST_LOG=info,asm_runner=warn,executor=warn,mem_planner_cpp=warn,proofman=warn,rom_setup=warn,sm_rom=warn,zisk=warn
      - ERE_ZISK_SETUP_ON_INIT=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1', '2', '3']
              capabilities: [gpu]

  reth-zisk:
    extends: ethrex-zisk
    command: ["--port", "3000", "--program-path", "/programs/stateless-validator-reth-zisk", "gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['4', '5', '6', '7']
              capabilities: [gpu]

  zkboost:
    image: zkboost:local
    build:
      context: ../../..
      dockerfile: ./docker/Dockerfile
    command: ["--config", "/app/config.toml"]
    depends_on:
      ethrex-zisk:
        condition: service_healthy
      reth-zisk:
        condition: service_healthy
    volumes:
      - ./zkboost/config.toml:/app/config.toml:ro
    networks:
      - zkboost
      - kurtosis
    environment:
      - RUST_LOG=info,zkboost=debug
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      start_period: 1s
      start_interval: 1s

volumes:
  programs:
    name: programs-v0.7.0

networks:
  zkboost:
    name: zkboost-local-testnet
  kurtosis:
    external: true
    name: kt-local-testnet
